name: Playwright smoke tests

on:
  # Run after every production deploy is live (Netlify auto-deploys on push to main).
  # The deploy takes ~20s; we wait before hitting the live URL.
  push:
    branches: [main]
    paths:
      - "**/*.html"
      - "netlify/functions/**"
      - "_redirects"
      - "netlify.toml"
      - "assets/**"
      - "tests/**"
      - "playwright.config.js"
      - "package.json"

  pull_request:
    paths:
      - "**/*.html"
      - "netlify/functions/**"
      - "_redirects"
      - "netlify.toml"
      - "assets/**"
      - "tests/**"
      - "playwright.config.js"
      - "package.json"

  # Weekly canary — catches rot in the live site (e.g. GHL widget changes,
  # upstream cert expiry, subdomain DNS drift).
  schedule:
    - cron: "0 7 * * 1"

  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install deps
        # Using `npm install` (not `npm ci`) because we deliberately don't
        # commit a full lockfile — the only runtime dep is @playwright/test
        # which itself pins a specific browser revision, so reproducibility
        # comes from the package.json version pin + Playwright browser cache.
        run: npm install --no-audit --no-fund

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      # Give Netlify ~30s to finish deploying after push-to-main before we hit
      # the live URL. Skipped on PR + dispatch (no deploy involved).
      - name: Wait for Netlify deploy
        if: github.event_name == 'push'
        run: |
          echo "Waiting 30s for Netlify to finish deploying..."
          sleep 30

      - name: Run Playwright tests
        env:
          BASE_URL: https://smorchestra.ai
          CI: "true"
        run: npx playwright test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
