# ============================================================
# SMOrchestra — Netlify configuration
# AI-Native Business OS · Hub-and-spoke deployment
# ============================================================

[build]
  publish = "."
  # Static site — no build step required. If/when we move to a generator,
  # set `command = "<build cmd>"` and `publish = "dist"`.

# ------------------------------------------------------------
# Headers
# ------------------------------------------------------------

# Security + performance defaults for every response.
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    # CSP is intentionally permissive while GHL embeds are still being wired.
    # Tighten in Phase 1D once all form/calendar domains are locked in.
    Content-Security-Policy = "default-src 'self' https: data: 'unsafe-inline' 'unsafe-eval'; frame-src https:; img-src 'self' https: data:;"

# Long cache for static assets (images, fonts, favicons).
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/logo/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# HTML should revalidate so content updates ship immediately.
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# sitemap.xml + robots.txt — short cache for SEO tools
[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Cache-Control = "public, max-age=3600"
    Content-Type = "application/xml; charset=utf-8"

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Cache-Control = "public, max-age=3600"
    Content-Type = "text/plain; charset=utf-8"

# ------------------------------------------------------------
# Pretty URLs (no .html extension for spokes and pillars)
# ------------------------------------------------------------
# Netlify's Asset Optimization auto-strips .html; these rewrites are
# explicit so links like /layers/ops resolve to /layers/ops/index.html
# or /layers/ops.html regardless of how files are organized.

[[redirects]]
  from = "/layers/ops"
  to = "/layers/ops.html"
  status = 200

[[redirects]]
  from = "/layers/gtm"
  to = "/layers/gtm.html"
  status = 200

[[redirects]]
  from = "/layers/dev"
  to = "/layers/dev.html"
  status = 200

[[redirects]]
  from = "/solutions/ai-revenue-os"
  to = "/solutions/ai-revenue-os.html"
  status = 200

[[redirects]]
  from = "/solutions/signal-sales-engine"
  to = "/solutions/signal-sales-engine.html"
  status = 200

[[redirects]]
  from = "/solutions/mena-expansion"
  to = "/solutions/mena-expansion.html"
  status = 200

[[redirects]]
  from = "/cohorts/gtm-founders"
  to = "/cohorts/gtm-founders.html"
  status = 200

[[redirects]]
  from = "/cohorts/ai-revenue-ops"
  to = "/cohorts/ai-revenue-ops.html"
  status = 200

