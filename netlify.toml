# ------------------------------------------------------------
# Legacy GHL slugs → new hub-and-spoke URLs (301 permanent)
# ------------------------------------------------------------
# Anyone still linking to the old GHL-hosted landing pages is carried
# forward with full SEO equity preserved.

[[redirects]]
  from = "/smorchestra-home-ghl"
  to = "/layers/gtm"
  status = 301

[[redirects]]
  from = "/the-engine-ghl"
  to = "/solutions/signal-sales-engine"
  status = 301

[[redirects]]
  from = "/the-expansion-ghl"
  to = "/solutions/mena-expansion"
  status = 301

[[redirects]]
  from = "/ai-revenue-os-landing-page"
  to = "/solutions/ai-revenue-os"
  status = 301

[[redirects]]
  from = "/gtmfoundercohort"
  to = "/cohorts/gtm-founders"
  status = 301

[[redirects]]
  from = "/AI-GTM-B2B-Cohort"
  to = "/cohorts/ai-revenue-ops"
  status = 301

# ------------------------------------------------------------
# External targets: booking + scorecards
# ------------------------------------------------------------
# /book proxies to the GHL calendar URL (update when final slug is set).
# Use 302 while the calendar is being tuned; flip to 301 once stable.

[[redirects]]
  from = "/book"
  to = "https://api.leadconnectorhq.com/widget/bookings/core-calendar-sales-calls"
  status = 302
  force = true

# Scorecards live on a subdomain (score.smorchestra.ai) served from the VPS.
# These aliases make marketing URLs clean without moving infra.

[[redirects]]
  from = "/tools/gtm-fitness"
  to = "https://score.smorchestra.ai/gtm-fitness"
  status = 302
  force = true

[[redirects]]
  from = "/tools/digital-revenue-score"
  to = "https://score.smorchestra.ai/digital-revenue-score"
  status = 302
  force = true

# Arabic mirror — scorecards live on the same English subdomain (no /ar variant yet).
[[redirects]]
  from = "/ar/tools/gtm-fitness"
  to = "https://score.smorchestra.ai/gtm-fitness"
  status = 302
  force = true

[[redirects]]
  from = "/ar/tools/digital-revenue-score"
  to = "https://score.smorchestra.ai/digital-revenue-score"
  status = 302
  force = true

# ------------------------------------------------------------
# Domain canonicalization (handled by Netlify primary-domain setting too,
# but kept here for clarity on any www / apex traffic).
# ------------------------------------------------------------
[[redirects]]
  from = "https://www.smorchestra.ai/*"
  to = "https://smorchestra.ai/:splat"
  status = 301
  force = true

# ------------------------------------------------------------
# Forms — not used (GHL handles form capture directly via iframe/script).
# Leaving Netlify Forms disabled intentionally.
# ------------------------------------------------------------
