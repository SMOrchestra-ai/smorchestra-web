<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank you — SMOrchestra</title>
    <meta name="description" content="We got your questionnaire. We'll reply within 24 hours.">
    <meta name="robots" content="noindex, nofollow">
    <link rel="icon" type="image/png" href="/logo/logo3.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #000000;
            --bg-alt: #0A0A0A;
            --accent: #FF6600;
            --accent-glow: rgba(255, 102, 0, 0.15);
            --text: #FFFFFF;
            --text-muted: #A3A3A3;
            --border: rgba(255, 255, 255, 0.08);
            --font: 'Inter', system-ui, -apple-system, sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
        }

        body {
            font-family: var(--font);
            background: linear-gradient(135deg, var(--bg) 0%, var(--bg-alt) 100%);
            color: var(--text);
            line-height: 1.6;
            display: flex;
            flex-direction: column;
        }

        /* Background accent blob — matches /test/* pages */
        body::before {
            content: '';
            position: fixed;
            top: -30%;
            right: -15%;
            width: 560px;
            height: 560px;
            background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
        }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 4rem 2rem;
            position: relative;
            z-index: 1;
        }

        .card {
            max-width: 540px;
            width: 100%;
            text-align: center;
        }

        .checkmark {
            width: 64px;
            height: 64px;
            margin: 0 auto 1.75rem;
            border-radius: 50%;
            background: var(--accent-glow);
            border: 2px solid var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent);
            font-size: 1.75rem;
            font-weight: 800;
            line-height: 1;
        }

        .eyebrow {
            display: inline-block;
            padding: 0.4rem 0.9rem;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--border);
            border-radius: 999px;
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 1.4px;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 1.25rem;
        }

        h1 {
            font-size: clamp(2rem, 5vw, 2.6rem);
            font-weight: 800;
            line-height: 1.15;
            letter-spacing: -0.02em;
            margin-bottom: 1rem;
        }

        h1 .accent {
            color: var(--accent);
        }

        p.lede {
            font-size: 1.05rem;
            color: var(--text-muted);
            line-height: 1.7;
            max-width: 44ch;
            margin: 0 auto;
        }

        .cta-back {
            display: inline-block;
            margin-top: 2rem;
            padding: 0.85rem 1.6rem;
            background: var(--accent);
            color: #000;
            border-radius: 8px;
            font-weight: 700;
            font-size: 0.95rem;
            letter-spacing: 0.02em;
            text-transform: uppercase;
            text-decoration: none;
            transition: transform 0.2s, background 0.2s;
        }

        .cta-back:hover {
            background: #CC5200;
            transform: translateY(-2px);
        }

        .meta-line {
            margin-top: 1.25rem;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .meta-line[hidden] {
            display: none;
        }

        /* FOOTER */
        footer {
            padding: 1.5rem 2rem;
            text-align: center;
            color: var(--text-muted);
            font-size: 0.85rem;
            position: relative;
            z-index: 1;
        }

        footer a {
            color: var(--accent);
            text-decoration: none;
        }

        footer a:hover {
            text-decoration: underline;
        }

        @media (max-width: 480px) {
            main {
                padding: 3rem 1.25rem;
            }

            h1 {
                font-size: 1.75rem;
            }

            p.lede {
                font-size: 0.98rem;
            }
        }
    </style>
</head>
<body>
    <main>
        <div class="card">
            <div class="checkmark" aria-hidden="true">✓</div>
            <div class="eyebrow">Received · Routing now</div>
            <h1>Thanks — <span class="accent">got it.</span></h1>
            <p class="lede">We'll review your answers and reply within 24 hours. Enterprise briefings route directly to Mamoun; everything else goes to the team.</p>
            <p class="meta-line" hidden data-meta-line>
                You joined the <span data-campaign></span> waitlist · <span data-offer></span>
            </p>
            <a href="/" class="cta-back" data-cta-back>Back to home</a>
        </div>
    </main>

    <footer>
        © 2026 SMOrchestra.ai
    </footer>

    <script>
        (function () {
            const ctaMap = {
                'cohort': '/cohort-resources',
                'training': '/training-overview',
                'marketing-transformation': '/case-studies',
                'ai-native-ops-system': '/layers/ops'
            };

            const params = new URLSearchParams(window.location.search);
            const wl = params.get('wl');
            const campaign = params.get('campaign');
            const offer = params.get('offer');

            if (wl && ctaMap[wl]) {
                const cta = document.querySelector('[data-cta-back]');
                if (cta) cta.setAttribute('href', ctaMap[wl]);
            }

            if (campaign) {
                document.querySelectorAll('[data-campaign]').forEach(el => el.textContent = campaign);
            }
            if (offer) {
                document.querySelectorAll('[data-offer]').forEach(el => el.textContent = offer);
            }
            if (wl && (campaign || offer)) {
                const meta = document.querySelector('[data-meta-line]');
                if (meta) meta.hidden = false;
            }

            if (wl && typeof window.gtag === 'function') {
                window.gtag('event', 'waitlist_signup', {
                    waitlist: wl,
                    campaign: campaign || '',
                    offer: offer || ''
                });
            }
        })();
    </script>
</body>
</html>
